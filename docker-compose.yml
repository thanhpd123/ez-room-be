version: '3.8'

services:
  ez-room-be:
    build: .
    container_name: ez-room-be
    # Đóng cổng 3000 ra ngoài để bảo mật, chỉ mở nội bộ cho Caddy gọi
    expose:
      - "3000"
    restart: always
    env_file:
      - .env

  # Thêm Caddy để tự động cấp chứng chỉ HTTPS (Let's Encrypt)
  caddy:
    image: caddy:2.7-alpine
    container_name: caddy_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ez-room-be

volumes:
  caddy_data:
  caddy_config: